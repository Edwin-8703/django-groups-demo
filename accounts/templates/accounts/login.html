{% extends 'accounts/base.html' %}
{% block content %}
<div class="card" style="max-width:340px;margin:60px auto">
  <h2>Login</h2>
  {% if form.errors %}
    <p style="color:#ff4444">Wrong username or password.</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <p style="margin-bottom:6px;font-size:11px;color:#556677">USERNAME</p>
    <input name="username" type="text" autofocus style="width:100%;background:#1a1a1a;border:1px solid #333;color:#eee;padding:8px;border-radius:4px;font-family:monospace;margin-bottom:12px"/>
    <p style="margin-bottom:6px;font-size:11px;color:#556677">PASSWORD</p>
    <input name="password" type="password" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#eee;padding:8px;border-radius:4px;font-family:monospace;margin-bottom:16px"/>
    <button type="submit" style="width:100%;background:#00ff88;color:#000;border:none;padding:9px;border-radius:4px;font-family:monospace;font-weight:bold;cursor:pointer">Sign In</button>
  </form>
</div>
{% endblock %}
